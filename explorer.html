<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Explorer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="config.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --light: #f8f9fa; }
        
        /* FULL SCREEN LAYOUT */
        body { margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* --- PANE 1: NAVIGATION (Left, Fixed 250px) --- */
        #nav-pane {
            width: 250px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            z-index: 2000;
            flex-shrink: 0;
        }
        #nav-pane h2 { margin-top: 0; font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        #nav-pane a { 
            color: #bdc3c7; text-decoration: none; padding: 12px 0; display: block; 
            transition: color 0.2s; font-size: 0.95rem;
        }
        #nav-pane a:hover { color: white; transform: translateX(5px); }
        #nav-pane a.active { color: white; font-weight: bold; color: var(--accent); }
        
        .nav-footer { margin-top: auto; font-size: 0.8rem; color: #7f8c8d; }

        /* --- PANE 2: FILTERS (Middle, Fixed 350px) --- */
        #filter-pane {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .filter-header { padding: 20px; background: white; border-bottom: 1px solid #eee; }
        .filter-header h3 { margin: 0 0 10px 0; color: #333; font-size: 1.1rem; }
        
        /* Status Text */
        #status-msg { font-size: 0.85rem; color: #27ae60; font-weight: 600; margin-bottom: 15px; display: block; }
        
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 5px; color: #555; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .results-area { flex-grow: 1; overflow-y: auto; background: white; border-top: 1px solid #ddd; }
        .results-count { padding: 10px 20px; background: #eee; font-size: 0.85rem; font-weight: bold; color: #555; border-bottom: 1px solid #ddd; }
        
        #results-list { list-style: none; padding: 0; margin: 0; }
        .result-item { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; cursor: pointer; transition: background 0.1s; }
        .result-item:hover { background: #eef7ff; border-left: 4px solid var(--accent); }
        .item-code { font-weight: bold; color: var(--primary); font-size: 0.95rem; }
        .item-title { font-size: 0.9rem; margin: 2px 0; color: #333; }
        .item-uni { font-size: 0.8rem; color: #7f8c8d; }

        /* --- PANE 3: MAP (Right, Flexible) --- */
        #map-pane { flex-grow: 1; position: relative; height: 100%; }
        #map { width: 100%; height: 100%; background: #ddd; }

        /* COPYRIGHT CONTROL */
        .leaflet-control-copyright-custom {
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 6px;
            font-size: 11px;
            color: #333;
            margin-right: 5px; margin-bottom: 5px;
            pointer-events: none; border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="nav-pane">
        <h2>Geospatial Syllabus Explorer</h2>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#" class="active"><i class="fa-solid fa-map"></i> Interactive Map</a>
        <a href="methodology.html"><i class="fa-solid fa-book"></i> Methodology</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact / Upload</a>
        
        <div class="nav-footer">
            v1.0.0
        </div>
    </div>

    <div id="filter-pane">
        <div class="filter-header">
            <h3>Search & Filters</h3>
            <span id="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</span>

            <div class="filter-group">
                <label>Keyword Search</label>
                <input type="text" id="search-input" placeholder="e.g. Python, Remote Sensing...">
            </div>

            <div class="filter-group">
                <label>Course Level</label>
                <select id="level-select"><option value="">All Levels</option></select>
            </div>

            <div class="filter-group">
                <label>Software</label>
                <select id="software-select"><option value="">All Software</option></select>
            </div>

            <div class="filter-group">
                <label>Domain</label>
                <select id="domain-select"><option value="">All Domains</option></select>
            </div>

            <button onclick="resetAll()" style="width:100%; padding:8px; background:#ecf0f1; border:none; border-radius:4px; cursor:pointer; color:#2c3e50; font-weight:600;">Reset Filters</button>
        </div>

        <div class="results-count">Matching Courses: <span id="count">0</span></div>
        
        <div class="results-area">
            <ul id="results-list">
                </ul>
        </div>
    </div>

    <div id="map-pane">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. SETUP MAP ---
        const map = L.map('map', { zoomControl: false }).setView([38, -96], 4);
        L.control.zoom({ position: 'topright' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // COPYRIGHT CONTROL
        const CopyrightControl = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function(map) {
                const div = L.DomUtil.create('div', 'leaflet-control-copyright-custom');
                div.innerHTML = "&copy; 2026 Dr. Jochen Albrecht, GISP"; 
                return div;
            }
        });
        map.addControl(new CopyrightControl());

        // --- 2. DATA LOGIC ---
        // Initialize Supabase using config.js
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
        
        let allData = [];
        let markers = L.layerGroup().addTo(map);

        async function init() {
            const statusEl = document.getElementById('status-msg');
            
            // Fetch View
            const { data, error } = await supabase.from('syllabus_map_view').select('*');
            
            if (error) {
                console.error("Supabase Error:", error);
                statusEl.innerHTML = '<span style="color:red"><i class="fa-solid fa-triangle-exclamation"></i> Connection Failed</span>';
                return;
            }

            if (!data || data.length === 0) {
                 statusEl.innerHTML = '<span style="color:orange">Connected, but database is empty.</span>';
                 return;
            }

            allData = data;
            statusEl.innerHTML = `<i class="fa-solid fa-check"></i> Ready. Loaded ${allData.length} courses.`;
            
            populateDropdowns();
            render(allData);
        }

        function populateDropdowns() {
            const levels = new Set();
            const softwares = new Set();
            const domains = new Set();

            allData.forEach(row => {
                if (row.course_level) levels.add(row.course_level);
                
                // Handle Arrays (Software & Domains)
                ['software', 'domains'].forEach(key => {
                    let list = [];
                    // Check if it's already an array or a JSON string
                    if(Array.isArray(row[key])) list = row[key];
                    else if(typeof row[key] === 'string') {
                        try { list = JSON.parse(row[key]); } catch(e){ list = [row[key]]; }
                    }
                    
                    // Normalize back to object for faster filtering later
                    row[key + '_list'] = list; 

                    list.forEach(item => {
                        if(key === 'software') softwares.add(item);
                        if(key === 'domains') domains.add(item);
                    });
                });
            });

            fillSelect('level-select', levels);
            fillSelect('software-select', softwares);
            fillSelect('domain-select', domains);
            
            // Listeners
            ['search-input', 'level-select', 'software-select', 'domain-select'].forEach(id => {
                document.getElementById(id).addEventListener('input', applyFilters);
            });
        }

        function fillSelect(id, set) {
            const sel = document.getElementById(id);
            // Clear except first
            while(sel.options.length > 1) sel.remove(1);
            
            Array.from(set).sort().forEach(val => {
                const opt = document.createElement('option');
                opt.value = val; opt.innerText = val;
                sel.appendChild(opt);
            });
        }

        function applyFilters() {
            const txt = document.getElementById('search-input').value.toLowerCase();
            const lvl = document.getElementById('level-select').value;
            const soft = document.getElementById('software-select').value;
            const dom = document.getElementById('domain-select').value;

            const res = allData.filter(d => {
                const matchTxt = !txt || (d.title && d.title.toLowerCase().includes(txt)) || (d.course_code && d.course_code.toLowerCase().includes(txt));
                const matchLvl = !lvl || d.course_level === lvl;
                
                // Array checking
                const matchSoft = !soft || (d.software_list && d.software_list.includes(soft));
                const matchDom = !dom || (d.domains_list && d.domains_list.includes(dom));
                
                return matchTxt && matchLvl && matchSoft && matchDom;
            });

            render(res);
        }

        function render(list) {
            markers.clearLayers();
            const ul = document.getElementById('results-list');
            ul.innerHTML = '';
            document.getElementById('count').innerText = list.length;

            list.forEach(d => {
                if(d.lat && d.lon) {
                    // Marker
                    const m = L.circleMarker([d.lat, d.lon], {
                        radius: 6, fillColor: '#3498db', color: 'white', weight: 1, fillOpacity: 0.8
                    }).bindPopup(`
                        <strong>${d.course_code}</strong><br>
                        ${d.title}<br>
                        <span style="color:#555; font-size:0.85rem">${d.university}</span>
                    `);
                    m.addTo(markers);

                    // List Item
                    const li = document.createElement('li');
                    li.className = 'result-item';
                    li.innerHTML = `
                        <div class="item-code">${d.course_code}</div>
                        <div class="item-title">${d.title}</div>
                        <div class="item-uni">${d.university}</div>
                    `;
                    li.onclick = () => {
                        map.flyTo([d.lat, d.lon], 11);
                        m.openPopup();
                    };
                    ul.appendChild(li);
                }
            });
        }

        function resetAll() {
            document.getElementById('search-input').value = '';
            document.getElementById('level-select').value = '';
            document.getElementById('software-select').value = '';
            document.getElementById('domain-select').value = '';
            applyFilters();
        }

        // Start
        init();
    </script>
</body>
</html>
