<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatial Syllabus Explorer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ERROR OVERLAY (Hidden by default) --- */
        #error-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; color: #ff5555; padding: 40px;
            font-family: monospace; font-size: 16px; white-space: pre-wrap; overflow: auto;
        }

        /* --- LAYOUT --- */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: row; }
        
        #sidebar {
            width: 450px; min-width: 450px; height: 100vh; background: #fff;
            border-right: 1px solid #ccc; display: flex; flex-direction: column; z-index: 1000;
        }
        #sidebar-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        #results-area { flex-grow: 1; overflow-y: auto; padding: 15px; background: #f4f6f8; }
        #map { flex-grow: 1; height: 100%; background: #e5e5e5; }
        
        /* Elements */
        .back-link { text-decoration: none; color: #666; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
        .card:hover { border-color: #3498db; }
        
        /* Filters */
        select { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; }
        #status-panel { margin: 10px 0; padding: 10px; background: #e8f5e9; color: #2e7d32; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="error-overlay"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const div = document.getElementById('error-overlay');
            div.style.display = 'block';
            div.innerHTML += `CRITICAL ERROR:\n${msg}\nLine: ${line}\n\n`;
            return false;
        };
    </script>

    <div id="sidebar">
        <div id="sidebar-header">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <h2>Syllabus Explorer</h2>
            <div id="status-panel">Initializing...</div>
            <input type="text" id="search-box" placeholder="Search..." style="width:100%; padding:10px; margin-bottom:10px;">
            
            <select id="level-filter"><option value="all">Any Level</option></select>
            <select id="domain-filter"><option value="all">Any Domain</option></select>
            <select id="assess-filter"><option value="all">Any Assessment</option></select>
            <select id="software-filter"><option value="all">Any Software</option></select>
            <select id="uni-filter"><option value="all">All Universities</option></select>
            <select id="format-filter"><option value="all">Any Format</option></select>
            
            <button onclick="resetFilters()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">Reset Filters</button>
            <span style="float:right; margin-top:10px; font-size:12px; color:#888;">Found <b id="course-count">0</b></span>
        </div>
        <div id="results-area"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // --- KEYS (Sanitized) ---
        const RAW_URL = "https://ygzxhhmckfyeywdfrwcp.supabase.co";
        const RAW_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnenhoaG1ja2Z5ZXl3ZGZyd2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0Nzc2MTAsImV4cCI6MjA4NDA1MzYxMH0.JrSW1-DyrduhK1_iAC-HgcwnxeDpzn98AVoriG0bTXw";
        
        // Remove spaces
        const SUPABASE_URL = RAW_URL.split(" ").join("");
        const SUPABASE_KEY = RAW_KEY.split(" ").join("");

        const GITHUB_PDF_BASE_URL = 'https://geojochen.github.io/UCGISsyllabusDB/pdfs/';
        
        let globalData = [];
        let map, markers;

        // Init Map
        map = L.map('map').setView([39.8, -98.5], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        markers = L.layerGroup().addTo(map);

        // Add Copyright
        const Copyright = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: () => {
                const d = L.DomUtil.create('div');
                d.style.background = 'rgba(255,255,255,0.8)';
                d.style.padding = '5px';
                d.innerHTML = "© 2026 Jochen Albrecht";
                return d;
            }
        });
        map.addControl(new Copyright());

        // Load Data
        async function load() {
            try {
                if(!window.supabase) throw new Error("Supabase library missing");
                
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data, error } = await client.from('syllabus_map_view').select('*');

                if(error) throw error;
                if(!data || data.length === 0) throw new Error("No data returned from DB");

                globalData = data.sort((a,b) => (a.university_name||"").localeCompare(b.university_name||""));
                
                document.getElementById('status-panel').innerHTML = "✅ Ready. " + data.length + " courses.";
                
                initFilters();
                render(globalData);

            } catch(e) {
                console.error(e);
                document.getElementById('status-panel').innerText = "Error: " + e.message;
                document.getElementById('status-panel').style.background = '#ffcdd2';
                document.getElementById('status-panel').style.color = '#c62828';
            }
        }

        // Filters
        const CONFIG = [
            {id:'level-filter', k:'course_level'},
            {id:'domain-filter', k:'application_domains', arr:true},
            {id:'assess-filter', k:'primary_assessment'},
            {id:'software-filter', k:'required_software', arr:true},
            {id:'uni-filter', k:'university_name'},
            {id:'format-filter', k:'delivery_format'}
        ];

        function initFilters() {
            CONFIG.forEach(c => {
                const vals = new Set();
                globalData.forEach(d => {
                    const v = d[c.k];
                    if(!v) return;
                    if(c.arr && Array.isArray(v)) v.forEach(x => vals.add(x));
                    else if(!c.arr) vals.add(v);
                });
                const sel = document.getElementById(c.id);
                Array.from(vals).sort().forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val; opt.innerText = val;
                    sel.appendChild(opt);
                });
                sel.onchange = applyFilters;
            });
            document.getElementById('search-box').oninput = applyFilters;
        }

        function applyFilters() {
            const txt = document.getElementById('search-box').value.toLowerCase();
            const active = {};
            CONFIG.forEach(c => active[c.id] = document.getElementById(c.id).value);

            const res = globalData.filter(d => {
                const blob = JSON.stringify(d).toLowerCase();
                if(txt && !blob.includes(txt)) return false;

                return CONFIG.every(c => {
                    const sel = active[c.id];
                    if(sel === 'all') return true;
                    const val = d[c.k];
                    if(!val) return false;
                    if(c.arr) return (val||[]).includes(sel);
                    return val === sel;
                });
            });

            render(res);
        }

        function render(list) {
            document.getElementById('course-count').innerText = list.length;
            const area = document.getElementById('results-area');
            area.innerHTML = '';
            markers.clearLayers();
            const bounds = L.latLngBounds();

            list.forEach(d => {
                // Marker
                if(d.lat && d.lon) {
                    const m = L.marker([d.lat, d.lon]).bindPopup(`<b>${d.course_code}</b><br>${d.university_name}`);
                    m.addTo(markers);
                    bounds.extend([d.lat, d.lon]);
                }
                
                // Card
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-weight:bold; color:#2c3e50">${d.course_code}: ${d.title}</div>
                    <div style="font-size:0.85rem; color:#666; margin-top:5px;">${d.university_name}</div>
                    <div style="margin-top:5px;">
                        ${d.course_level ? `<span style="background:#fff3e0; padding:2px 5px; font-size:10px;">${d.course_level}</span>` : ''}
                    </div>
                `;
                card.onclick = () => {
                   if(d.lat && d.lon) map.flyTo([d.lat, d.lon], 12);
                };
                
                // Add PDF Link if exists
                if(d.pdf_filename) {
                     const a = document.createElement('a');
                     a.href = GITHUB_PDF_BASE_URL + d.pdf_filename;
                     a.target = '_blank';
                     a.innerText = "View PDF";
                     a.style.display = "block";
                     a.style.marginTop = "10px";
                     a.style.fontSize = "0.8rem";
                     a.style.color = "#e74c3c";
                     card.appendChild(a);
                }

                area.appendChild(card);
            });

            if(list.length && bounds.isValid()) map.fitBounds(bounds, {padding:[50,50], maxZoom:10});
        }

        window.resetFilters = () => {
            document.querySelectorAll('select').forEach(s => s.value='all');
            document.getElementById('search-box').value='';
            applyFilters();
        }

        load();
    </script>
</body>
</html>
