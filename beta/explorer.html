<!DOCTYPE html>
<html>
<head>
    <title>Geospatial Syllabus Explorer (Diagnostic Mode)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- DIAGNOSTIC HEADER --- */
        #diagnostic-bar {
            background: #222; color: #fff; padding: 10px; font-family: monospace; font-size: 12px;
            border-bottom: 2px solid red; height: 150px; overflow-y: auto;
        }
        .log-success { color: #0f0; }
        .log-error { color: #f55; font-weight: bold; }
        .log-info { color: #88f; }

        /* --- STANDARD LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        body { display: flex; flex-direction: column; } /* Changed to column to fit debug bar */
        #main-container { display: flex; flex: 1; height: calc(100vh - 150px); }
        
        #sidebar {
            width: 450px; min-width: 450px; background: #fff; display: flex; flex-direction: column;
            border-right: 1px solid #ccc; z-index: 2000; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        #sidebar-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
        #results-area { flex-grow: 1; overflow-y: auto; padding: 15px; background: #f4f6f8; }
        #map { flex-grow: 1; background-color: #e5e5e5; }
        
        /* ... (Keeping your existing styles for cards/filters minimal for brevity) ... */
        .card { background: white; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        select { width: 100%; padding: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="diagnostic-bar">
        <strong>DIAGNOSTIC LOG:</strong><br>
    </div>

    <div id="main-container">
        <div id="sidebar">
            <div id="sidebar-header">
                <h3>Syllabus Explorer</h3>
                <div id="status-panel">Connecting...</div>
                <input type="text" id="search-box" placeholder="Search..." style="width:100%; padding:8px;">
                <br><br>
                <select id="level-filter"><option value="all">Any Level</option></select>
                <select id="uni-filter"><option value="all">All Universities</option></select>
                <button onclick="resetFilters()">Reset Filters</button>
                <div>Found <b id="course-count">0</b> courses</div>
            </div>
            <div id="results-area"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        // --- DIAGNOSTIC LOGGER ---
        const logBox = document.getElementById('diagnostic-bar');
        function log(msg, type='info') {
            logBox.innerHTML += `<div class="log-${type}">> ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- 1. KEY SANITIZATION ---
        const RAW_URL = "https://ygzxhhmckfyeywdfrwcp.supabase.co";
        // This is the key that worked in test_connection.html
        const RAW_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnenhoaG1ja2Z5ZXl3ZGZyd2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0Nzc2MTAsImV4cCI6MjA4NDA1MzYxMH0.JrSW1-DyrduhK1_iAC-HgcwnxeDpzn98AVoriG0bTXw";

        // Remove any invisible characters (newlines, spaces, etc)
        const SUPABASE_URL = RAW_URL.replace(/\s/g, '').trim();
        const SUPABASE_KEY = RAW_KEY.replace(/\s/g, '').trim();

        // Print Key Verification
        log(`URL: ${SUPABASE_URL}`);
        log(`KEY (Last 5 chars): ...${SUPABASE_KEY.slice(-5)}`);
        log(`KEY Length: ${SUPABASE_KEY.length} (Expected: ~202)`);

        // --- APP LOGIC ---
        let globalData = [];
        let map, markers;

        async function init() {
            // 1. Map
            try {
                map = L.map('map').setView([39.8, -98.5], 4);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                markers = L.layerGroup().addTo(map);
                log("Map initialized.", "success");
            } catch(e) { log("Map Error: " + e.message, "error"); }

            // 2. Supabase
            log("Connecting to Supabase...", "info");
            try {
                if (!window.supabase) throw new Error("Supabase JS not loaded");
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Fetch
                const { data, error } = await supabase.from('syllabus_map_view').select('*');

                if (error) {
                    log(`API ERROR: ${error.message}`, "error");
                    log(`Hint: ${error.hint || 'No hint provided'}`, "error");
                    document.getElementById('status-panel').innerText = "Connection Failed";
                } else {
                    log(`SUCCESS! Loaded ${data.length} rows.`, "success");
                    globalData = data;
                    render(globalData);
                    document.getElementById('status-panel').innerText = "Ready";
                }

            } catch (err) {
                log(`CRITICAL ERROR: ${err.message}`, "error");
            }
        }

        function render(data) {
            document.getElementById('course-count').innerText = data.length;
            const resEl = document.getElementById('results-area');
            resEl.innerHTML = '';
            markers.clearLayers();

            data.forEach(d => {
                if (d.lat && d.lon) {
                    L.marker([d.lat, d.lon]).bindPopup(d.title).addTo(markers);
                }
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<b>${d.course_code}</b><br>${d.title}`;
                resEl.appendChild(div);
            });
        }
        
        window.resetFilters = () => log("Reset clicked");

        init();
    </script>
</body>
</html>
