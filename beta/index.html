<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatial Syllabus Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #222; overflow: hidden; }
        #bg-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(44,62,80,0.7); color: white; text-align: center; }
        h1 { font-size: 3rem; margin: 0 0 20px 0; }
        .btn { padding: 15px 30px; background: #3498db; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; }
        #stats { font-family: monospace; color: #ccc; }
    </style>
</head>
<body>

    <div id="bg-map"></div>
    <div class="overlay">
        <h1>Geospatial Syllabus Explorer</h1>
        <a href="explorer.html" class="btn">Launch Explorer</a>
        <div id="stats">Connecting to database...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const RAW_URL = "https://ygzxhhmckfyeywdfrwcp.supabase.co";
        const RAW_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnenhoaG1ja2Z5ZXl3ZGZyd2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0Nzc2MTAsImV4cCI6MjA4NDA1MzYxMH0.JrSW1-DyrduhK1_iAC-HgcwnxeDpzn98AVoriG0bTXw";

        const SUPABASE_URL = RAW_URL.split(" ").join("");
        const SUPABASE_KEY = RAW_KEY.split(" ").join("");

        async function init() {
            const map = L.map('bg-map', {zoomControl:false, attributionControl:false}).setView([20,0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            try {
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                // Fetch ONLY lat/lon to check connection
                const { data, error } = await client.from('syllabus_map_view').select('lat,lon');

                if(error) throw error;

                document.getElementById('stats').innerText = `Tracking ${data.length} syllabi worldwide.`;

                data.forEach(d => {
                    if(d.lat && d.lon) {
                        L.circleMarker([d.lat, d.lon], {
                            radius: 3, fillColor: '#3498db', color: 'none', fillOpacity: 0.8
                        }).addTo(map);
                    }
                });

            } catch(e) {
                console.error(e);
                document.getElementById('stats').innerHTML = `<span style="color:#ff5555">Error: ${e.message}</span>`;
            }
        }
        init();
    </script>
</body>
</html>
